                'streaming': 'catStreaming', 'gaming': 'catGaming', 'code': 'catCode',
                'automotive': 'catAuto', 'lifestyle': 'catLifestyle', 'business': 'catBusiness',

            };

        }

        // --- RENDER LOGIC ---
        async function loadProducts() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('productGrid').classList.add('hidden');
            document.getElementById('loading').innerHTML = `<div class="text-center"><div class="loader mb-2"></div><p class="text-gray-400 text-sm">${t('txtLoading')}</p></div>`;

            try {
                const q = query(productsCollection, orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                allProducts = [];
                querySnapshot.forEach((doc) => { allProducts.push({ id: doc.id, ...doc.data() }); });
                if(allProducts.length > 0) renderHeroCard(allProducts[0]);
                renderProducts(allProducts);
            } catch (error) { console.error(error); } 
            finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('productGrid').classList.remove('hidden');
            }
        }

        function renderHeroCard(p) {
            const heroCard = document.getElementById('heroCard');
            const imgContent = p.image ? `<img src="${p.image}" class="absolute inset-0 w-full h-full object-cover transition duration-700">` : `<div class="w-full h-full bg-gradient-to-br from-gray-800 to-black flex items-center justify-center text-white font-bold text-6xl">${p.initial || '?'}</div>`;
            heroCard.innerHTML = `<div class="relative h-2/3 w-full overflow-hidden">${imgContent}<div class="absolute top-4 left-4 px-3 py-1 bg-green-500 text-white rounded-full text-xs font-bold shadow-lg">${t('cardNew')}</div></div><div class="p-6 h-1/3 flex flex-col justify-center bg-white/90 dark:bg-black/80 backdrop-blur"><h3 class="text-2xl font-bold text-slate-900 dark:text-white mb-1 line-clamp-1">${p.name}</h3><p class="text-gray-500 text-sm mb-3">${getCategoryLabel(p.category)}</p><div class="flex justify-between items-center"><div><p class="text-[10px] text-gray-400 uppercase">${t('cardStart')}</p><p class="text-2xl font-black text-cyan-500">Rp ${p.price}</p></div><button onclick="document.getElementById('catalog').scrollIntoView()" class="w-10 h-10 rounded-full bg-slate-900 dark:bg-white text-white dark:text-black flex items-center justify-center hover:scale-110 transition">➜</button></div></div>`;
        }

        function renderProducts(data) {
            const grid = document.getElementById('productGrid');
            document.getElementById('totalItems').innerText = data.length;
            let filtered = data;
            if (currentCat !== 'all') filtered = data.filter(p => p.category === currentCat);
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            if(searchVal) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchVal));

            grid.innerHTML = '';
            if(filtered.length === 0) { grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">${t('txtEmpty')}</div>`; return; }

            filtered.forEach(p => {
                const imgContent = p.image ? `<img src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700" loading="lazy">` : `<div class="w-full h-full bg-slate-800 flex items-center justify-center text-white text-4xl font-bold">${p.initial||'?'}</div>`;
                
                // --- FIXED DELETE BUTTON LOGIC (INLINE ONCLICK) ---
                let adminBtns = isAdmin ? `
                    <div class="absolute top-3 right-3 z-20 flex gap-2">
                        <button class="btn-edit bg-white/20 backdrop-blur border border-white/30 text-white p-2 rounded-xl hover:bg-yellow-500 transition" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-image="${p.image||''}" data-cat="${p.category}"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>

                    </div>` : '';

                grid.innerHTML += `<div class="group glass-panel rounded-3xl overflow-hidden hover:-translate-y-2 hover:shadow-2xl hover:shadow-cyan-500/10 transition-all duration-500 relative">${adminBtns}<div class="relative h-56 bg-gray-100 dark:bg-[#151515] overflow-hidden">${imgContent}<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-black/80 to-transparent"></div><span class="absolute bottom-3 left-4 text-xs font-bold text-white uppercase tracking-widest bg-cyan-500/80 backdrop-blur px-2 py-1 rounded-md">${getCategoryLabel(p.category)}</span></div><div class="p-6"><h3 class="font-bold text-lg text-slate-900 dark:text-white leading-snug mb-3 group-hover:text-cyan-500 transition line-clamp-2">${p.name}</h3><div class="flex justify-between items-center pt-2"><div><p class="text-[10px] text-gray-400 uppercase">${t('lblPrice')}</p><p class="font-black text-xl text-cyan-600 dark:text-cyan-400 font-mono">Rp ${p.price}</p></div><button class="w-10 h-10 rounded-full bg-slate-900 dark:bg-white text-white dark:text-black flex items-center justify-center hover:scale-110 hover:rotate-45 transition shadow-lg" onclick="window.open('https://wa.me/6282270189045?text=Beli ${p.name}', '_blank')"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg></button></div></div></div>`;
            });
            attachEditEvents();

                title: t('admAddTitle'), html: `
                <input id="n" class="swal2-input" placeholder="Name">
                <input id="p" class="swal2-input" placeholder="Price">
                <select id="c" class="swal2-input bg-gray-700 text-white">
                    <option value="streaming">Streaming</option><option value="gaming">Gaming</option><option value="code">Source Code</option>
                    <option value="automotive">Automotive</option><option value="lifestyle">Lifestyle</option><option value="business">Business</option>
                    <option value="health">Health</option><option value="it-software">IT & Software</option><option value="teaching">Teaching</option>
                    <option value="marketing">Marketing</option><option value="design">Design</option><option value="finance">Finance</option>
                    <option value="photo-video">Photo & Video</option><option value="development">Development</option><option value="music">Music</option>
                    <option value="other">Other</option>
                </select>
                <input id="i" class="swal2-input" placeholder="Image URL">`,
                background:'#1e293b', color:'#fff', confirmButtonText: t('btnSave'),
                preConfirm: () => ({ name: document.getElementById('n').value, price: document.getElementById('p').value, category: document.getElementById('c').value, image: document.getElementById('i').value, initial: '?', timestamp: Date.now() })
            });
            if(v) { await addDoc(productsCollection, v); loadProducts(); Swal.fire(t('admSuccess'), "", "success"); }
        });

        const tBtn = document.getElementById('themeToggle');
        function updateIcons() { if (document.documentElement.classList.contains('dark')) { document.getElementById('sunIcon').classList.remove('hidden'); document.getElementById('moonIcon').classList.add('hidden'); } else { document.getElementById('sunIcon').classList.add('hidden'); document.getElementById('moonIcon').classList.remove('hidden'); } }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); } updateIcons();
        tBtn.addEventListener('click', () => { document.documentElement.classList.toggle('dark'); localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light'; updateIcons(); });

        document.getElementById('searchInput').addEventListener('input', loadProducts);
    </script>
  </body>
</html>
