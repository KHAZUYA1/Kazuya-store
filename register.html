<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - PT SINO INDAH JAYA</title>
    <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl">
        <div class="text-center mb-8">
            <img src="image/logo.png" class="h-12 mx-auto mb-4">
            <h2 class="text-2xl font-bold text-slate-800">Buat Akun Karir</h2>
            <p class="text-slate-500 text-sm">Bergabunglah dengan tim kami</p>
        </div>

        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Nama Lengkap</label>
                <input type="text" id="reg-name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Email</label>
                <input type="email" id="reg-email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
                <input type="password" id="reg-password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            
            <button type="submit" class="w-full bg-[#0f172a] text-white font-bold py-3 rounded-lg hover:bg-slate-800 transition">
                DAFTAR SEKARANG
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-600">
            Sudah punya akun? <a href="login.html" class="text-amber-500 font-bold hover:underline">Login disini</a>
        </p>
    </div>

    <script type="module" src="js/auth_register.js"></script>
</body>
</html>
