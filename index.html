            if (document.documentElement.classList.contains('dark')) {
                document.getElementById('sunIcon').classList.remove('hidden');
                document.getElementById('moonIcon').classList.add('hidden');
            } else {
                document.getElementById('sunIcon').classList.add('hidden');
                document.getElementById('moonIcon').classList.remove('hidden');
            }
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tBtn.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            updateIcons();
        });

        async function loadProducts() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('productGrid').classList.add('hidden');

            try {
                const q = query(productsCollection, orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                allProducts = [];
                querySnapshot.forEach((doc) => { allProducts.push({ id: doc.id, ...doc.data() }); });
                
                // Urutkan Best Seller Paling Atas
                allProducts.sort((a, b) => (b.isBestSeller === true) - (a.isBestSeller === true));

                if(allProducts.length > 0) renderHeroCard(allProducts[0]);
                renderProducts(allProducts);
            } catch (error) { console.error(error); } 
            finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('productGrid').classList.remove('hidden');
            }
        }

function renderProducts(data) {
    const grid = document.getElementById('productGrid');
    let filtered = data;
    
    // Filter Hidden (Hanya admin yang bisa lihat produk hidden)
    if (!isAdmin) {
        filtered = filtered.filter(p => p.isVisible !== false);
    }

    if (currentCat !== 'all') filtered = filtered.filter(p => p.category === currentCat);
    const searchVal = document.getElementById('searchInput').value.toLowerCase();
    if(searchVal) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchVal));

    document.getElementById('totalItems').innerText = filtered.length;
    grid.innerHTML = '';

    if(filtered.length === 0) { 
        grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">Produk tidak ditemukan.</div>`; 
        return; 
    }

    filtered.forEach(p => {
        const imgContent = p.image ? `<img src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700" loading="lazy">` : `<div class="w-full h-full bg-slate-800 flex items-center justify-center text-white text-4xl font-bold">${p.initial||'?'}</div>`;
        const bestSellerBadge = p.isBestSeller ? `<div class="absolute top-3 right-3 z-10 px-2 py-1 bg-yellow-400 text-black text-[10px] font-bold rounded shadow-lg">🔥 TERLARIS</div>` : '';
        
        // Tampilan Admin (Hidden)
        const isHidden = p.isVisible === false;
        const hiddenClass = isHidden ? 'opacity-50 grayscale border-2 border-red-500' : '';

                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>

            </div>` : '';

        grid.innerHTML += `
            <div class="group glass-panel rounded-3xl overflow-hidden hover:-translate-y-2 hover:shadow-2xl hover:shadow-cyan-500/10 transition-all duration-500 relative cursor-pointer ${hiddenClass}" onclick="window.openProductModal('${p.id}')">
