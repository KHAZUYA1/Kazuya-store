<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System - PT SINO INDAH JAYA</title>
    <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
    
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border-t-4 border-amber-500">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-[#0f172a]">Selamat Datang</h2>
            <p class="text-slate-500">Silakan login untuk melanjutkan</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Email</label>
                <input type="email" id="login-email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-amber-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
                <input type="password" id="login-password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-amber-500">
            </div>
            
            <button type="submit" class="w-full bg-amber-500 text-white font-bold py-3 rounded-lg hover:bg-amber-600 transition shadow-lg shadow-amber-500/30">
                MASUK
            </button>
        </form>

        <div class="mt-6 flex justify-between text-sm">
            <a href="index.html" class="text-slate-500 hover:text-slate-800">← Kembali ke Beranda</a>
            <a href="register.html" class="text-blue-600 font-bold hover:underline">Daftar Karir</a>
        </div>
    </div>

    <script type="module" src="js/auth_login.js"></script>
</body>
</html>
